<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Order online for pickup at Maple &amp; Main.">
<title>Maple &amp; Main · Order Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --steel:#2B2B2E;
    --steel-line:#3E3E42;
    --chrome:#B9C1C7;
    --cream:#FAF3E4;
    --cream-dark:#EFE4CB;
    --ink:#1C1B19;
    --diner-red:#C8102E;
    --mustard:#F2A93B;
    --grill-green:#3F7A55;
    --muted:#8E8B84;
  }
  html{background:var(--steel);}
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--steel);
    background-image:repeating-linear-gradient(115deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 40px);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .display{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
  .mono{font-family:'Space Mono',monospace;}

  .checker{
    height:6px;width:100%;
    background-image:
      linear-gradient(45deg, var(--ink) 25%, transparent 25%),
      linear-gradient(-45deg, var(--ink) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--ink) 75%),
      linear-gradient(-45deg, transparent 75%, var(--ink) 75%);
    background-size:12px 12px;
    background-color:var(--cream);
    background-position:0 0, 0 6px, 6px -6px, -6px 0;
  }

  .topbar{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:16px 20px;border-bottom:1px solid var(--steel-line);
    position:sticky;top:0;background:var(--steel);z-index:20;
  }
  .brand-center{text-align:center;line-height:1;}
  .brand-center strong{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;}
  .cart-btn{
    justify-self:end;
    display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--cream);
    border:1px solid var(--steel-line);background:var(--steel-line);
    padding:8px 14px;border-radius:20px;cursor:pointer;
  }
  .cart-btn .cart-btn-count{
    background:var(--diner-red);color:#fff;min-width:18px;height:18px;border-radius:50%;
    font-size:11px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;
  }
  .nav-menu-wrap{position:relative;justify-self:start;}
  .nav-menu-btn{
    width:38px;height:38px;border-radius:8px;border:1px solid var(--steel-line);
    background:var(--steel-line);color:var(--cream);font-size:16px;cursor:pointer;
  }
  .nav-dropdown{
    display:none;position:absolute;top:46px;left:0;background:var(--cream);color:var(--ink);
    border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,0.4);min-width:170px;overflow:hidden;z-index:50;
  }
  .nav-dropdown.open{display:block;}
  .nav-item{padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .nav-item:hover{background:var(--cream-dark);}

  .contact-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:60;}
  .contact-modal-backdrop.open{display:block;}
  .contact-modal{
    display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--cream);color:var(--ink);border-radius:14px;padding:0 20px 20px;
    width:90%;max-width:380px;z-index:61;
  }
  .contact-modal.open{display:block;}
  .contact-modal .checker{border-radius:14px 14px 0 0;}
  .contact-modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;margin:16px 0 12px;}
  .contact-line{font-size:14px;margin-bottom:10px;color:#4b3f22;}
  .contact-line strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#7a6c46;margin-bottom:2px;}
  .pay-confirm-row{
    margin-top:14px;display:flex;align-items:flex-start;gap:10px;background:#EFE4CB;
    border:1px dashed #b8a870;border-radius:8px;padding:10px 12px;
  }
  .pay-confirm-row input[type="checkbox"]{width:18px;height:18px;margin-top:2px;flex:none;}
  .pay-confirm-row label{font-size:12px;color:#4b3f22;font-weight:600;line-height:1.4;}

  .customer{max-width:720px;margin:0 auto;padding:20px 16px 120px;background:var(--steel);}
  .cat-rail{
    display:flex;gap:8px;overflow-x:auto;padding:14px 0 14px;
    position:sticky;top:71px;z-index:15;background:var(--steel);
  }
  .cat-pill{
    flex:none;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;
    background:var(--steel-line);color:var(--muted);cursor:pointer;white-space:nowrap;
    text-transform:uppercase;letter-spacing:0.5px;
  }
  .cat-pill.active{background:var(--mustard);color:var(--ink);}
  .cat-title{
    font-family:'Bebas Neue',sans-serif;color:var(--mustard);font-size:22px;letter-spacing:1px;
    margin:24px 0 10px;display:flex;align-items:center;gap:10px;
    scroll-margin-top:130px;
  }
  .cat-title::after{content:'';flex:1;height:1px;background:var(--steel-line);}
  .dish{
    display:flex;gap:12px;align-items:center;background:#343330;
    border:1px solid var(--steel-line);border-radius:10px;padding:12px;margin-bottom:10px;
  }
  .dish-info{flex:1;min-width:0;}
  .dish-info h3{font-size:15px;color:var(--cream);margin:0;font-weight:700;}
  .dish-info p{margin:3px 0 0;font-size:12px;color:var(--muted);}
  .dish-price{font-family:'Space Mono',monospace;color:var(--mustard);font-size:14px;margin-top:6px;}
  .qty-ctrl{display:flex;align-items:center;gap:8px;flex:none;}
  .qty-btn{
    width:28px;height:28px;border-radius:6px;border:1px solid var(--steel-line);
    background:var(--steel);color:var(--cream);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .qty-btn.add{background:var(--grill-green);border-color:var(--grill-green);color:#fff;}
  .qty-num{white-space:nowrap;font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);}

  .cart-fab{
    position:fixed;left:16px;right:16px;bottom:16px;max-width:688px;margin:0 auto;
    background:var(--diner-red);color:#fff;border-radius:10px;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);cursor:pointer;z-index:30;
    text-transform:uppercase;letter-spacing:0.5px;font-size:13px;
  }
  .cart-fab .count{
    background:#fff;color:var(--diner-red);width:22px;height:22px;border-radius:50%;
    font-size:12px;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;
  }

  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40;display:none;}
  .drawer-backdrop.open{display:block;}
  .drawer{
    position:fixed;left:0;right:0;bottom:0;max-height:85vh;overflow-y:auto;
    background:var(--cream);color:var(--ink);border-radius:16px 16px 0 0;
    padding:0 18px 24px;z-index:41;transform:translateY(100%);transition:transform .25s ease;
  }
  .drawer.open{transform:translateY(0);}
  .drawer .checker{border-radius:16px 16px 0 0;}
  .drawer h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin:16px 0 14px;}
  .cart-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed #cbbd94;}
  .cart-line .name{font-weight:600;font-size:14px;}
  .cart-line .sub{font-size:12px;color:#8a7a52;}
  .field{margin-top:16px;}
  .field label{font-size:11px;color:#7a6c46;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
  .field input, .field select, .field textarea{
    width:100%;margin-top:6px;padding:10px;border-radius:8px;border:1px solid #cbbd94;
    background:#fff;font-family:'Inter',sans-serif;font-size:14px;
  }
  .pay-banner{
    margin-top:16px;padding:10px 12px;background:#EFE4CB;border:1px dashed #b8a870;border-radius:8px;
    font-size:12px;color:#6b5d38;text-align:center;
  }
  .total-row{display:flex;justify-content:space-between;margin-top:16px;font-weight:700;font-size:17px;}
  .submit-btn{
    width:100%;margin-top:16px;padding:14px;border:none;border-radius:8px;
    background:var(--diner-red);color:#fff;font-weight:700;font-size:14px;cursor:pointer;
    text-transform:uppercase;letter-spacing:1px;
  }
  .submit-btn:disabled{opacity:0.5;}
  .empty-cart{color:#8a7a52;font-size:13px;text-align:center;padding:24px 0;}

  .confirm{text-align:center;padding:16px 0 4px;}
  .confirm .stub{
    display:inline-block;background:#fff;border:2px dashed #b8a870;border-radius:8px;
    padding:14px 30px;margin:12px 0;position:relative;
  }
  .confirm .stub::before{
    content:'';position:absolute;bottom:-6px;left:0;right:0;height:8px;
    background-image:radial-gradient(circle, var(--cream) 3px, transparent 3.5px);
    background-position:bottom;background-repeat:repeat-x;background-size:12px 12px;
  }
  .confirm .stub .num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;letter-spacing:2px;}
  .track-status{
    margin-top:8px;font-size:13px;color:#6b5d38;font-weight:600;
  }
  .track-time{
    margin-top:10px;display:inline-block;background:var(--diner-red);color:#fff;
    padding:10px 20px;border-radius:8px;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;
  }

  .item-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:70;}
  .item-modal-backdrop.open{display:block;}
  .item-modal{
    display:none;position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;
    background:var(--cream);color:var(--ink);border-radius:16px 16px 0 0;
    padding:0 18px 20px;z-index:71;
  }
  .item-modal.open{display:block;}
  .item-modal .checker{border-radius:16px 16px 0 0;}
  .item-modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin:16px 0 4px;}
  .item-modal .item-desc{font-size:13px;color:#7a6c46;margin-bottom:4px;}
  .item-modal .item-price{font-family:'Space Mono',monospace;color:var(--diner-red);font-weight:700;margin-bottom:12px;}
  .option-group{margin-top:16px;}
  .option-group-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#4b3f22;margin-bottom:8px;}
  .option-group-hint{font-size:11px;color:#8a7a52;font-weight:600;margin-left:6px;text-transform:none;letter-spacing:0;}
  .option-choice{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
    border:1px solid #cbbd94;background:#fff;margin-bottom:6px;cursor:pointer;font-size:13px;
  }
  .option-choice.selected{background:var(--mustard);border-color:var(--mustard);font-weight:700;}
  .option-choice input{pointer-events:none;}
  .qty-stepper-row{
    display:flex;align-items:center;justify-content:center;gap:18px;margin-top:18px;
  }
  .qty-stepper-row .qty-btn{width:36px;height:36px;font-size:18px;}
  .qty-stepper-row .qty-display{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;min-width:24px;text-align:center;}
</style>
</head>
<body>

<div class="checker"></div>
<div class="topbar">
  <div class="nav-menu-wrap">
    <button class="nav-menu-btn" id="navMenuBtn">☰</button>
    <div class="nav-dropdown" id="navDropdown">
      <div class="nav-item" id="navHomeBtn">Home</div>
      <div class="nav-item" id="navContactBtn">Contact</div>
    </div>
  </div>
  <button class="brand-center" id="brandHomeBtn" style="background:none;border:none;cursor:pointer;padding:0;"><strong id="brandNameCenter">MAPLE &amp; MAIN</strong></button>
  <button class="cart-btn" id="cartBtnTop">🛒 <span class="cart-btn-count" id="cartBtnCount">0</span></button>
</div>

<div class="contact-modal-backdrop" id="contactBackdrop"></div>
<div class="contact-modal" id="contactModal">
  <div class="checker"></div>
  <h2>Contact Us</h2>
  <div id="contactBody"></div>
  <button class="submit-btn" id="closeContact" style="background:var(--grill-green);">Close</button>
</div>

<div class="item-modal-backdrop" id="itemModalBackdrop"></div>
<div class="item-modal" id="itemModal"></div>

<div class="customer" id="customerView"></div>
<div class="cart-fab" id="cartFab" style="display:none;">
  <span><span class="count" id="cartCount">0</span>View order</span>
  <span id="cartTotal" class="mono">$0</span>
</div>
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer"></div>

<script>
const DEFAULT_SITE = {
  name: 'MAPLE & MAIN',
  tagline: 'Est. on Main Street',
  payNote: 'No online payment — please pay at the counter or with your server.',
  contact: { phone: '', address: '', hours: '' }
};
const DEFAULT_MENU = [
  {cat:'Griddle & Eggs', items:[
    {id:'d1', name:'Buttermilk Pancake Stack', desc:'Three tall stack, warm maple syrup', price:11, emoji:'🥞', soldOut:false, optionGroups:[]},
    {id:'d2', name:'The Main Street Skillet', desc:'Eggs, hash browns, cheddar, peppers', price:13, emoji:'🍳', soldOut:false, optionGroups:[]},
  ]},
  {cat:'From the Grill', items:[
    {id:'d3', name:'Bacon Cheeseburger', desc:'Half-pound patty, smoked bacon, fries', price:15, emoji:'🍔', soldOut:false, optionGroups:[]},
    {id:'d4', name:'BBQ Pulled Pork Sandwich', desc:'Slow-smoked, house slaw, brioche bun', price:14, emoji:'🥪', soldOut:false, optionGroups:[]},
    {id:'d5', name:'Baked Mac & Cheese', desc:'Three-cheese blend, toasted crumb topping', price:12, emoji:'🧀', soldOut:false, optionGroups:[]},
  ]},
  {cat:'Fountain & Sides', items:[
    {id:'d6', name:'Hand-Spun Milkshake', desc:'Vanilla, chocolate, or strawberry', price:7, emoji:'🥤', soldOut:false, optionGroups:[]},
    {id:'d7', name:'Sweet Tea', desc:'Southern-style, brewed daily', price:3, emoji:'🧊', soldOut:false, optionGroups:[]},
    {id:'d8', name:'Slice of Apple Pie', desc:'Warm, with a scoop of vanilla', price:6, emoji:'🥧', soldOut:false, optionGroups:[]},
  ]},
];

let MENU = DEFAULT_MENU;
let SITE = DEFAULT_SITE;
let cartItems = []; // [{lineId, dishId, name, price, qty, note, options:{label:value}}]
let activeCat = MENU[0].cat;
let trackingOrderId = null;
let trackingTimer = null;

// item modal state
let modalDish = null;
let modalQty = 1;
let modalNote = '';
let modalSelections = {}; // groupId -> string (single) or array (multi)

function applySiteInfo(){
  document.getElementById('brandNameCenter').textContent = SITE.name;
  document.title = SITE.name + ' · Order Online';
}

async function loadConfig(silent){
  try{
    const res = await fetch('/api/config');
    if(res.ok){
      const cfg = await res.json();
      if(cfg.menu && cfg.menu.length){
        cfg.menu.forEach(sec=>sec.items.forEach(it=>{ if(!Array.isArray(it.optionGroups)) it.optionGroups = []; }));
        MENU = cfg.menu;
      }
      if(cfg.siteInfo) SITE = cfg.siteInfo;
    }
  }catch(e){}
  if(!MENU.find(s=>s.cat===activeCat)) activeCat = MENU[0].cat;
  applySiteInfo();
  if(!silent) renderCustomer();
  else if(document.getElementById('customerView').innerHTML) renderCustomer();
}

function startTracking(orderId){
  trackingOrderId = orderId;
  if(trackingTimer) clearInterval(trackingTimer);
  trackingTimer = setInterval(checkOrderStatus, 3000);
  checkOrderStatus();
}
function stopTracking(){
  trackingOrderId = null;
  if(trackingTimer){ clearInterval(trackingTimer); trackingTimer = null; }
}
async function checkOrderStatus(){
  if(!trackingOrderId) return;
  try{
    const res = await fetch('/api/orders/'+trackingOrderId);
    if(!res.ok) return;
    const order = await res.json();
    updateTrackingUI(order);
  }catch(e){}
}
function updateTrackingUI(order){
  const statusEl = document.getElementById('trackStatus');
  const timeEl = document.getElementById('trackTime');
  const closeBtn = document.getElementById('closeConfirm');
  if(!statusEl || !timeEl) return;
  if(!order.pickupTime){
    statusEl.textContent = 'Waiting for the restaurant to confirm your pickup time…';
    timeEl.style.display = 'none';
    return;
  }
  statusEl.textContent = 'Order confirmed';
  timeEl.style.display = 'block';
  timeEl.textContent = 'Pickup time: ' + order.pickupTime;
  if(closeBtn){
    closeBtn.disabled = false;
    closeBtn.textContent = 'Done';
  }
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cartQtyForDish(dishId){
  return cartItems.filter(ci=>ci.dishId===dishId).reduce((sum,ci)=>sum+ci.qty,0);
}

function renderCustomer(){
  const el = document.getElementById('customerView');
  let html = '<div class="cat-rail">';
  MENU.forEach((sec,i)=>{
    html += `<div class="cat-pill ${sec.cat===activeCat?'active':''}" data-cat="${escapeHtml(sec.cat)}" data-target="cat-section-${i}">${escapeHtml(sec.cat)}</div>`;
  });
  html += '</div>';
  MENU.forEach((sec,i)=>{
    html += `<div class="cat-title" id="cat-section-${i}">${escapeHtml(sec.cat)}</div>`;
    sec.items.forEach(it=>{
      const inCartQty = cartQtyForDish(it.id);
      html += `
        <div class="dish">
          <div class="dish-info">
            <h3>${escapeHtml(it.name)}</h3>
            <p>${escapeHtml(it.desc)}</p>
            <div class="dish-price">$${it.price}${it.soldOut?' · <span style="color:var(--diner-red);">Sold Out</span>':''}</div>
          </div>
          ${it.soldOut ? '' : `
          <div class="qty-ctrl">
            ${inCartQty>0?`<div class="qty-num">${inCartQty} in cart</div>`:''}
            <div class="qty-btn add" data-act="openItem" data-id="${it.id}">+</div>
          </div>`}
        </div>`;
    });
  });
  el.innerHTML = html;
  updateCartFab();
}

function cartCountTotal(){
  let count=0, total=0;
  cartItems.forEach(ci=>{ count+=ci.qty; total+=ci.qty*ci.price; });
  return {count,total};
}

function updateCartFab(){
  const {count,total} = cartCountTotal();
  document.getElementById('cartFab').style.display = count>0 ? 'flex':'none';
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = '$'+total;
  document.getElementById('cartBtnCount').textContent = count;
}

// ---------- item options modal ----------
function openItemModal(dishId){
  const dish = MENU.flatMap(s=>s.items).find(i=>i.id===dishId);
  if(!dish) return;
  modalDish = dish;
  modalQty = 1;
  modalNote = '';
  modalSelections = {};
  (dish.optionGroups||[]).forEach(g=>{ modalSelections[g.id] = g.type==='multi' ? [] : null; });
  renderItemModal();
  document.getElementById('itemModalBackdrop').classList.add('open');
  document.getElementById('itemModal').classList.add('open');
}
function closeItemModal(){
  document.getElementById('itemModalBackdrop').classList.remove('open');
  document.getElementById('itemModal').classList.remove('open');
  modalDish = null;
}
function canAddItem(){
  if(!modalDish) return false;
  return (modalDish.optionGroups||[]).every(g=>{
    const sel = modalSelections[g.id];
    return g.type==='multi' ? (sel && sel.length===g.count) : !!sel;
  });
}
function renderItemModal(){
  const dish = modalDish;
  if(!dish) return;
  const modal = document.getElementById('itemModal');
  let groupsHtml = '';
  (dish.optionGroups||[]).forEach(g=>{
    const sel = modalSelections[g.id];
    if(g.type==='multi'){
      const count = (sel||[]).length;
      groupsHtml += `<div class="option-group">
        <div class="option-group-label">${escapeHtml(g.label)}<span class="option-group-hint">(${count}/${g.count} selected)</span></div>
        ${(g.choices||[]).map(c=>{
          const isSel = sel.includes(c);
          const disable = !isSel && count>=g.count;
          return `<div class="option-choice ${isSel?'selected':''}" data-gid="${g.id}" data-choice="${escapeHtml(c)}" data-type="multi" style="${disable?'opacity:0.45;':''}">
            <input type="checkbox" ${isSel?'checked':''} ${disable?'disabled':''}> ${escapeHtml(c)}
          </div>`;
        }).join('')}
      </div>`;
    } else {
      groupsHtml += `<div class="option-group">
        <div class="option-group-label">${escapeHtml(g.label)}</div>
        ${(g.choices||[]).map(c=>{
          const isSel = sel===c;
          return `<div class="option-choice ${isSel?'selected':''}" data-gid="${g.id}" data-choice="${escapeHtml(c)}" data-type="single">
            <input type="radio" ${isSel?'checked':''}> ${escapeHtml(c)}
          </div>`;
        }).join('')}
      </div>`;
    }
  });
  const canAdd = canAddItem();
  modal.innerHTML = `
    <div class="checker"></div>
    <h2>${escapeHtml(dish.name)}</h2>
    <div class="item-desc">${escapeHtml(dish.desc)}</div>
    <div class="item-price mono">$${dish.price}</div>
    ${groupsHtml}
    <div class="field">
      <label>Note for this item (optional)</label>
      <textarea id="modalNoteInput" rows="2" placeholder="e.g. no wasabi, extra spicy…">${escapeHtml(modalNote)}</textarea>
    </div>
    <div class="qty-stepper-row">
      <div class="qty-btn" id="modalDec">−</div>
      <div class="qty-display" id="modalQtyDisplay">${modalQty}</div>
      <div class="qty-btn add" id="modalInc">+</div>
    </div>
    <button class="submit-btn" id="addItemBtn" ${canAdd?'':'disabled'}>Add to Cart — $${(dish.price*modalQty)}</button>
  `;
  document.getElementById('modalNoteInput').oninput = (e)=>{ modalNote = e.target.value; };
  document.getElementById('modalDec').onclick = ()=>{ if(modalQty>1){ modalQty--; renderItemModal(); } };
  document.getElementById('modalInc').onclick = ()=>{ modalQty++; renderItemModal(); };
  modal.querySelectorAll('.option-choice').forEach(el=>{
    el.onclick = ()=>{
      const gid = el.dataset.gid, choice = el.dataset.choice, type = el.dataset.type;
      if(type==='single'){
        modalSelections[gid] = choice;
      } else {
        const g = (dish.optionGroups||[]).find(x=>x.id===gid);
        const arr = modalSelections[gid] || [];
        const idx = arr.indexOf(choice);
        if(idx>-1){ arr.splice(idx,1); }
        else if(arr.length < g.count){ arr.push(choice); }
        modalSelections[gid] = arr;
      }
      renderItemModal();
    };
  });
  const addBtn = document.getElementById('addItemBtn');
  if(addBtn && canAdd){
    addBtn.onclick = addModalItemToCart;
  }
}
function addModalItemToCart(){
  const dish = modalDish;
  if(!dish || !canAddItem()) return;
  const options = {};
  (dish.optionGroups||[]).forEach(g=>{
    const sel = modalSelections[g.id];
    options[g.label] = g.type==='multi' ? sel.join(', ') : sel;
  });
  cartItems.push({
    lineId: 'ci_'+Date.now()+'_'+Math.floor(Math.random()*10000),
    dishId: dish.id, name: dish.name, price: dish.price,
    qty: modalQty, note: modalNote, options
  });
  closeItemModal();
  renderCustomer();
}

function renderDrawer(showConfirm){
  const drawer = document.getElementById('drawer');
  if(showConfirm){
    drawer.innerHTML = `
      <div class="checker"></div>
      <div class="confirm">
        <div style="font-size:13px;color:#7a6c46;text-transform:uppercase;letter-spacing:1px;font-weight:700;">Order sent to the restaurant</div>
        <div id="trackStatus" class="track-status">Waiting for the restaurant to confirm your pickup time…</div>
        <div id="trackTime" class="track-time" style="display:none;"></div>
        <div style="font-size:12px;color:#7a6c46;margin-top:10px;">Please pay in store when you arrive or when your order is ready.</div>
        <button class="submit-btn" style="margin-top:18px;background:var(--grill-green);" id="closeConfirm" disabled>Waiting for confirmation…</button>
      </div>`;
    document.getElementById('closeConfirm').onclick = ()=>{
      if(document.getElementById('closeConfirm').disabled) return;
      stopTracking();
      cartItems = [];
      renderCustomer();
      closeDrawer();
    };
    return;
  }
  const {count,total} = cartCountTotal();
  let html = '<div class="checker"></div><h2>Your Order</h2>';
  if(count===0){
    html += '<div class="empty-cart">Your cart is empty — pick something off the menu</div>';
  } else {
    cartItems.forEach(ci=>{
      const optLines = Object.entries(ci.options||{}).map(([label,val])=>`<div class="sub">${escapeHtml(label)}: ${escapeHtml(val)}</div>`).join('');
      const noteLine = ci.note ? `<div class="sub">Note: ${escapeHtml(ci.note)}</div>` : '';
      html += `<div class="cart-line" style="align-items:flex-start;">
        <div>
          <div class="name">${escapeHtml(ci.name)}</div>
          ${optLines}
          ${noteLine}
          <div class="sub" style="margin-top:4px;">
            <span class="qty-btn" data-act="lineDec" data-lineid="${ci.lineId}" style="display:inline-flex;width:22px;height:22px;font-size:13px;">−</span>
            <span class="mono" style="margin:0 8px;">${ci.qty}</span>
            <span class="qty-btn add" data-act="lineInc" data-lineid="${ci.lineId}" style="display:inline-flex;width:22px;height:22px;font-size:13px;">+</span>
            <span data-act="lineRemove" data-lineid="${ci.lineId}" style="margin-left:12px;color:var(--diner-red);font-weight:700;cursor:pointer;">Remove</span>
          </div>
        </div>
        <div class="mono">$${ci.price*ci.qty}</div>
      </div>`;
    });
    html += `
      <div class="field">
        <label>Your name</label>
        <input id="customerName" placeholder="For pickup call-out" />
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input id="customerPhone" type="tel" placeholder="e.g. (555) 123-4567" />
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="orderNote" rows="2" placeholder="Allergies, no onions, extra sauce…"></textarea>
      </div>
      <div class="pay-confirm-row">
        <input type="checkbox" id="payInStoreConfirm">
        <label for="payInStoreConfirm">Pay in store — I understand payment is not collected online.</label>
      </div>
      <div class="total-row"><span>Total (pay in store)</span><span class="mono">$${total}</span></div>
      <button class="submit-btn" id="submitOrder" disabled>Place Order</button>`;
  }
  drawer.innerHTML = html;

  drawer.querySelectorAll('[data-act="lineInc"]').forEach(el=>{
    el.onclick = ()=>{
      const ci = cartItems.find(x=>x.lineId===el.dataset.lineid);
      if(ci){ ci.qty++; renderDrawer(false); renderCustomer(); }
    };
  });
  drawer.querySelectorAll('[data-act="lineDec"]').forEach(el=>{
    el.onclick = ()=>{
      const ci = cartItems.find(x=>x.lineId===el.dataset.lineid);
      if(ci){
        ci.qty--;
        if(ci.qty<=0) cartItems = cartItems.filter(x=>x.lineId!==el.dataset.lineid);
        renderDrawer(false); renderCustomer();
      }
    };
  });
  drawer.querySelectorAll('[data-act="lineRemove"]').forEach(el=>{
    el.onclick = ()=>{
      cartItems = cartItems.filter(x=>x.lineId!==el.dataset.lineid);
      renderDrawer(false); renderCustomer();
    };
  });

  const payCheck = document.getElementById('payInStoreConfirm');
  const submitBtn = document.getElementById('submitOrder');
  if(payCheck && submitBtn){
    payCheck.onchange = ()=>{ submitBtn.disabled = !payCheck.checked; };
    submitBtn.onclick = submitOrder;
  }
}

function openDrawer(){
  document.getElementById('drawerBackdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderDrawer(false);
}
function closeDrawer(){
  stopTracking();
  document.getElementById('drawerBackdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

async function submitOrder(){
  const btn = document.getElementById('submitOrder');
  btn.disabled = true; btn.textContent = 'Sending…';
  const {total} = cartCountTotal();
  const items = cartItems.map(ci=>({
    name: ci.name, qty: ci.qty, price: ci.price, note: ci.note || '', options: ci.options || {}
  }));
  const name = document.getElementById('customerName').value;
  const phone = document.getElementById('customerPhone').value;
  const note = document.getElementById('orderNote').value;
  const payload = {
    items, total, note, name, phone,
    location: 'Pickup',
  };
  try{
    const res = await fetch('/api/orders', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('order failed');
    const order = await res.json();
    renderDrawer(true);
    startTracking(order.id);
  }catch(e){
    btn.disabled = false; btn.textContent = 'Place Order';
    alert('Something went wrong — please try again.');
    console.error(e);
  }
}

document.getElementById('customerView').addEventListener('click', (e)=>{
  const t = e.target.closest('.cat-pill, .qty-btn');
  if(!t) return;
  if(t.classList.contains('cat-pill')){
    activeCat = t.dataset.cat;
    const targetId = t.dataset.target;
    renderCustomer();
    const target = document.getElementById(targetId);
    if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    return;
  }
  if(t.dataset.act === 'openItem'){
    openItemModal(t.dataset.id);
  }
});

document.getElementById('itemModalBackdrop').onclick = closeItemModal;

document.getElementById('cartFab').onclick = openDrawer;
document.getElementById('cartBtnTop').onclick = openDrawer;
document.getElementById('drawerBackdrop').onclick = closeDrawer;

document.getElementById('navMenuBtn').onclick = (e)=>{
  e.stopPropagation();
  document.getElementById('navDropdown').classList.toggle('open');
};
document.addEventListener('click', ()=>{
  document.getElementById('navDropdown').classList.remove('open');
});
document.getElementById('navContactBtn').onclick = ()=>{
  document.getElementById('navDropdown').classList.remove('open');
  renderContact();
  document.getElementById('contactBackdrop').classList.add('open');
  document.getElementById('contactModal').classList.add('open');
};
document.getElementById('closeContact').onclick = closeContact;
document.getElementById('contactBackdrop').onclick = closeContact;
function closeContact(){
  document.getElementById('contactBackdrop').classList.remove('open');
  document.getElementById('contactModal').classList.remove('open');
}

function goHome(){
  document.getElementById('navDropdown').classList.remove('open');
  closeContact();
  closeDrawer();
  closeItemModal();
  activeCat = MENU[0].cat;
  renderCustomer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
document.getElementById('navHomeBtn').onclick = goHome;
document.getElementById('brandHomeBtn').onclick = goHome;
function renderContact(){
  const c = SITE.contact || {};
  const rows = [];
  if(c.phone) rows.push(`<div class="contact-line"><strong>Phone</strong>${escapeHtml(c.phone)}</div>`);
  if(c.address) rows.push(`<div class="contact-line"><strong>Address</strong>${escapeHtml(c.address)}</div>`);
  if(c.hours) rows.push(`<div class="contact-line"><strong>Hours</strong>${escapeHtml(c.hours)}</div>`);
  document.getElementById('contactBody').innerHTML = rows.length ? rows.join('') : '<div class="contact-line">Contact info coming soon.</div>';
}

loadConfig(false);
setInterval(()=>loadConfig(true), 20000);
</script>
